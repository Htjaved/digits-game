<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FBF7EF" />
<title>Arcade — table games</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500;1,9..144,600&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="eyebrow">Table games</span><h1 id="brandTitle">Arcade</h1></div>
      <div id="codeChip"></div>
    </div>
    <div id="app"></div>
    <div class="foot" id="foot">Pick a game · pick a mode · play it out</div>
  </div>

<script type="module">
const app = document.getElementById('app');
const chip = document.getElementById('codeChip');
const brandTitle = document.getElementById('brandTitle');
const foot = document.getElementById('foot');

const GAMES = [
  { id:'digits',  emoji:'🔢', banner:'icons/digits-banner.jpg',  title:'Digits',          sub:'Crack the secret number',     foot:'Pick a number · trade guesses · crack the code' },
  { id:'hangman', emoji:'🔤', banner:'icons/hangman-banner.jpg', title:'Hangman',         sub:'Guess letters, race to reveal', foot:'Pick a word · guess letters · don\u2019t run out of lives' },
  { id:'q20',     emoji:'❓', banner:'icons/q20-banner.jpg',     title:'20 Questions',    sub:'Ask, answer, and guess',        foot:'Pick a secret · ask or guess · crack it first' },
  { id:'dab',     emoji:'▦',  banner:'icons/dab-banner.jpg',     title:'Dots & Boxes',    sub:'Claim the most boxes',          foot:'Draw a line · claim a box · most boxes wins' },
  { id:'xo',      emoji:'✕',  banner:'icons/xo-banner.jpg',      title:'XO',              sub:'Tic-tac-toe, but it fades',     foot:'Place a mark · your oldest fades after 3 · plan ahead' },
];

let currentTeardown = null;

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderArcadeMenu(){
  brandTitle.textContent = 'Arcade';
  foot.textContent = 'Pick a game · pick a mode · play it out';
  chip.innerHTML = '';
  app.innerHTML = `
    <div class="card">
      <p class="lede">Small two-player games built for two phones — or one, passed back and forth. Pick one to start.</p>
    </div>
    <div class="modegrid">
      ${GAMES.map(g=>`
        <button class="modecard ${g.banner?'bgimg':(g.id==='digits'?'primary':'')}" data-game="${g.id}" aria-label="${esc(g.title)} — ${esc(g.sub)}" ${g.banner?`style="background-image:url(${g.banner})"`:''}>
          ${g.banner ? '' : `<span class="micon">${g.emoji}</span><span class="mtitle">${esc(g.title)}</span><span class="msub">${esc(g.sub)}</span>`}
        </button>
      `).join('')}
    </div>`;
  document.querySelectorAll('[data-game]').forEach(btn=>{
    btn.addEventListener('click', ()=> loadGame(btn.dataset.game));
  });
}

async function exitToMenu(){
  if(currentTeardown){ try{ currentTeardown(); }catch(e){} currentTeardown=null; }
  renderArcadeMenu();
}

async function loadGame(id){
  const meta = GAMES.find(g=>g.id===id);
  if(meta){ brandTitle.textContent = meta.title; foot.textContent = meta.foot; }
  app.innerHTML = `<div class="card" style="text-align:center;padding:40px 20px;color:var(--muted)">Loading…</div>`;
  try{
    if(id==='digits'){
      const mod = await import('./games/digits.js');
      currentTeardown = mod.teardownDigits;
      await mod.initDigits(app, chip, exitToMenu);
    } else if(id==='hangman'){
      const mod = await import('./games/hangman.js');
      currentTeardown = mod.teardownHangman;
      await mod.initHangman(app, chip, exitToMenu);
    } else if(id==='q20'){
      const mod = await import('./games/q20.js');
      currentTeardown = mod.teardownQ20;
      await mod.initQ20(app, chip, exitToMenu);
    } else if(id==='dab'){
      const mod = await import('./games/dab.js');
      currentTeardown = mod.teardownDab;
      await mod.initDab(app, chip, exitToMenu);
    } else if(id==='xo'){
      const mod = await import('./games/xo.js');
      currentTeardown = mod.teardownXo;
      await mod.initXo(app, chip, exitToMenu);
    } else {
      exitToMenu();
    }
  }catch(e){
    app.innerHTML = `<div class="err">Couldn't load this game (${esc(e.message||'unknown error')}). <button class="linkbtn" id="retryBtn">‹ Back to Arcade</button></div>`;
    const r=document.getElementById('retryBtn'); if(r) r.addEventListener('click', exitToMenu);
  }
}

renderArcadeMenu();
</script>
</body>
</html>
