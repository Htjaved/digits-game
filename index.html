<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FBF7EF" />
<title>Arcade — table games</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500;1,9..144,600&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="eyebrow">Table games</span><h1 id="brandTitle">Arcade</h1></div>
      <div id="codeChip"></div>
    </div>
    <div id="app"></div>
    <div class="foot" id="foot">Pick a game · pick a mode · play it out</div>
  </div>

<script type="module">
const app = document.getElementById('app');
const chip = document.getElementById('codeChip');
const brandTitle = document.getElementById('brandTitle');
const foot = document.getElementById('foot');

const GAMES = [
  { id:'digits',  cover:'icons/digits-cover.jpg',     glow:'#3DDC84', title:'Digits',            sub:'Crack the secret number',       foot:'Pick a number · trade guesses · crack the code' },
  { id:'hangman', cover:'icons/hangman-cover.jpg',     glow:'#EDE3CC', title:'Hangman',           sub:'Guess letters, race to reveal',  foot:'Pick a word · guess letters · don\u2019t run out of lives' },
  { id:'q20',     cover:'icons/q20-cover.jpg',         glow:'#9B6BFF', title:'20 Questions',      sub:'Ask, answer, and guess',         foot:'Pick a secret · ask or guess · crack it first' },
  { id:'dab',     cover:'icons/dab-cover.jpg',         glow:'#3B6FE2', title:'Dots & Boxes',      sub:'Claim the most boxes',           foot:'Draw a line · claim a box · most boxes wins' },
  { id:'xo',      cover:'icons/xo-cover.jpg',          glow:'#2FD5D5', title:'XO',                sub:'Tic-tac-toe, but it fades',      foot:'Place a mark · your oldest fades after 3 · plan ahead' },
  { id:'fc',      cover:'icons/fc-cover.jpg',          glow:'#F2A93B', title:'Fill the Category', sub:'Submit words, judge, or guess',  foot:'Submit a word · judge it · guess their category to win' },
  { id:'battleship', cover:'icons/battleship-cover.jpg', glow:'#E2563B', title:'Battleship',      sub:'Find, hit, and sink the fleet',  foot:'Place your fleet · fire · sink every ship to win' },
];

let currentTeardown = null;

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderArcadeMenu(){
  brandTitle.textContent = 'Arcade';
  foot.textContent = 'Pick a game · pick a mode · play it out';
  chip.innerHTML = '';
  app.innerHTML = `
    <div class="archead">
      <p class="sub">Quick two-player games. Pass one phone, or play across two.</p>
    </div>
    <div class="gamegrid">
      ${GAMES.map(g=>`
        <button class="gamecard" data-game="${g.id}" aria-label="${esc(g.title)} — ${esc(g.sub)}" style="--glow:${g.glow};background-image:url(${g.cover})">
          <div class="carddot"></div>
          <div class="cardinfo">
            <div class="cardtitle">${esc(g.title)}</div>
            <div class="cardplayers">2 PLAYERS</div>
          </div>
        </button>
      `).join('')}
    </div>`;
  document.querySelectorAll('[data-game]').forEach(btn=>{
    btn.addEventListener('click', ()=> loadGame(btn.dataset.game));
  });
}

async function exitToMenu(){
  if(currentTeardown){ try{ currentTeardown(); }catch(e){} currentTeardown=null; }
  renderArcadeMenu();
}

async function loadGame(id){
  const meta = GAMES.find(g=>g.id===id);
  if(meta){ brandTitle.textContent = meta.title; foot.textContent = meta.foot; }
  app.innerHTML = `<div class="card" style="text-align:center;padding:40px 20px;color:var(--muted)">Loading…</div>`;
  try{
    if(id==='digits'){
      const mod = await import('./games/digits.js');
      currentTeardown = mod.teardownDigits;
      await mod.initDigits(app, chip, exitToMenu);
    } else if(id==='hangman'){
      const mod = await import('./games/hangman.js');
      currentTeardown = mod.teardownHangman;
      await mod.initHangman(app, chip, exitToMenu);
    } else if(id==='q20'){
      const mod = await import('./games/q20.js');
      currentTeardown = mod.teardownQ20;
      await mod.initQ20(app, chip, exitToMenu);
    } else if(id==='dab'){
      const mod = await import('./games/dab.js');
      currentTeardown = mod.teardownDab;
      await mod.initDab(app, chip, exitToMenu);
    } else if(id==='xo'){
      const mod = await import('./games/xo.js');
      currentTeardown = mod.teardownXo;
      await mod.initXo(app, chip, exitToMenu);
    } else if(id==='fc'){
      const mod = await import('./games/fc.js');
      currentTeardown = mod.teardownFc;
      await mod.initFc(app, chip, exitToMenu);
    } else if(id==='battleship'){
      const mod = await import('./games/battleship.js');
      currentTeardown = mod.teardownBattleship;
      await mod.initBattleship(app, chip, exitToMenu);
    } else {
      exitToMenu();
    }
  }catch(e){
    app.innerHTML = `<div class="err">Couldn't load this game (${esc(e.message||'unknown error')}). <button class="linkbtn" id="retryBtn">‹ Back to Arcade</button></div>`;
    const r=document.getElementById('retryBtn'); if(r) r.addEventListener('click', exitToMenu);
  }
}

renderArcadeMenu();
</script>
</body>
</html>
